<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Karaoke MOËT - Solicitar Canción</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #d4af37; --black: #0a0a0a; --gray: #1a1a1a; }
        body { background: var(--black); color: var(--gold); font-family: 'Playfair Display', serif; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .card { background: var(--gray); padding: 40px; border-radius: 15px; border: 1px solid var(--gold); box-shadow: 0 10px 30px rgba(0,0,0,0.8); width: 100%; max-width: 350px; text-align: center; }
        h1 { text-transform: uppercase; letter-spacing: 4px; margin-bottom: 30px; font-size: 22px; }
        input { width: 100%; background: #000; border: 1px solid #333; padding: 12px; margin-bottom: 15px; color: #fff; border-radius: 5px; box-sizing: border-box; font-family: sans-serif; }
        input:focus { border-color: var(--gold); outline: none; box-shadow: 0 0 5px var(--gold); }
        button { width: 100%; padding: 15px; background: linear-gradient(45deg, #d4af37, #f2d06b); border: none; border-radius: 5px; color: #000; font-weight: bold; text-transform: uppercase; cursor: pointer; transition: 0.3s; margin-top: 10px; font-family: sans-serif; }
        button:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(212, 175, 55, 0.4); }
        #res { margin-top: 20px; font-size: 13px; font-family: sans-serif; font-weight: bold; min-height: 15px; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Karaoke MOËT</h1>
        <input type="text" id="nombre" placeholder="TU NOMBRE">
        <input type="text" id="cancion" placeholder="TÍTULO DE LA CANCIÓN">
        <input type="text" id="artista" placeholder="ARTISTA">
        <button onclick="enviar()">Enviar Solicitud</button>
        <div id="res"></div>
    </div>

    <script>
        async function enviar() {
            const resDiv = document.getElementById('res');
            const btn = document.querySelector('button');
            
            const payload = {
                nombre: document.getElementById('nombre').value.trim(),
                cancion: document.getElementById('cancion').value.trim(),
                artista: document.getElementById('artista').value.trim()
            };

            if(!payload.nombre || !payload.cancion) {
                resDiv.style.color = "#ff4d4d";
                resDiv.innerText = "POR FAVOR, COMPLETE LOS DATOS.";
                return;
            }

            try {
                resDiv.style.color = "#d4af37"; // Error corregido: añadidas comillas
                resDiv.innerText = "PROCESANDO SOLICITUD...";
                btn.disabled = true;

                const response = await fetch('https://karaoke-bar-d7qa.onrender.com/pedir', {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(payload)
                });

                if(response.ok) {
                    resDiv.innerText = "SOLICITUD ENVIADA CORRECTAMENTE.";
                    document.getElementById('nombre').value = "";
                    document.getElementById('cancion').value = "";
                    document.getElementById('artista').value = "";
                } else {
                    resDiv.style.color = "#ff4d4d";
                    resDiv.innerText = "ERROR EN EL SERVIDOR.";
                }
            } catch (error) {
                resDiv.style.color = "#ff4d4d";
                resDiv.innerText = "ERROR DE CONEXIÓN.";
            } finally {
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
