<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Administración - Karaoke</title>
    
    <script>
        if (sessionStorage.getItem('admin_auth') !== 'true') {
            window.location.href = "login.html";
        }
    </script>

    <link rel="stylesheet" href="style.css">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
</head>
<body>
    <div class="container">
        <button onclick="logout()" style="float: right; background: #ff4d4d; color: white; border: none; padding: 5px 10px; border-radius: 5px; cursor: pointer;">Cerrar Sesión</button>
        
        <h1>Panel de Administración</h1>
        <p>Gestión de cola de canciones</p>
        
        <div id="lista-canciones">
            </div>
    </div>

    <script src="script.js"></script>
    <script>
        // Función para cerrar sesión
        function logout() {
            sessionStorage.removeItem('admin_auth');
            window.location.href = "login.html";
        }
    </script>
</body>
</html>
