<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso Staff - Karaoke Bar</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background-color: #f0f2f5; /* O el color de fondo de tu bar */
        }
        .login-card {
            background: white;
            padding: 2rem;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 350px;
            text-align: center;
        }
        .login-card h2 {
            margin-bottom: 1.5rem;
            color: #333;
        }
        input[type="password"] {
            width: 100%;
            padding: 12px;
            margin-bottom: 1rem;
            border: 2px solid #ddd;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 1rem;
        }
        .btn-login {
            width: 100%;
            padding: 12px;
            font-weight: bold;
            text-transform: uppercase;
        }
        #error-msg {
            color: #ff4d4d;
            font-size: 0.9rem;
            margin-bottom: 1rem;
            display: none;
        }
    </style>
</head>
<body>

    <div class="login-card">
        <h2>🎤 Área Staff</h2>
        <p style="color: #666; margin-bottom: 1.5rem;">Introduce el código de seguridad</p>
        
        <input type="password" id="adminPass" placeholder="Contraseña...">
        <div id="error-msg">Contraseña incorrecta</div>
        
        <button onclick="verificar()" class="btn btn-login">Entrar</button>
    </div>

    <script>
        function verificar() {
            const entrada = document.getElementById('adminPass').value;
            // --- CAMBIA ESTA CLAVE POR LA QUE TÚ QUIERAS ---
            const claveSecreta = "KARAOKE_VIP"; 

            if (entrada === claveSecreta) {
                // Creamos la "llave" en la sesión del navegador
                sessionStorage.setItem('admin_auth', 'true');
                // Redirigimos al administrador
                window.location.href = "admin.html";
            } else {
                const msg = document.getElementById('error-msg');
                msg.style.display = 'block';
                document.getElementById('adminPass').value = "";
            }
        }

        // Para entrar también pulsando la tecla Enter
        document.getElementById('adminPass').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') verificar();
        });
    </script>
</body>
</html>
